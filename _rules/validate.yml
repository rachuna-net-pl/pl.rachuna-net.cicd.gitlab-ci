---
.rule:validate:yamllint:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH || $CI_MERGE_REQUEST_ID
      changes:
        compare_to: 'refs/heads/main'
        paths:
          - "**/*.yml"
          - "**/*.yaml"
      when: on_success
    - when: never

.rule:validate:terraform:
  rules:
    - if: '$PROJECT_TYPE != "terraform" && $PROJECT_TYPE != "terraform-module"'
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success


.rule:validate:packer:
  rules:
    - if: '$PROJECT_TYPE != "packer"'
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success


.role:validate:ansible:
  rules:
    - if: '$PROJECT_TYPE != "ansible-playbook"'
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success
