---
.rule:unit-test:terraform:
  rules:
    - if: '$PROJECT_TYPE != "terraform"'
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success


.rule:unit-test:molecule:
  rules:
    - if: '$PROJECT_TYPE != "ansible-role"'
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success